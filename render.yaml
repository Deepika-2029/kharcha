databases:
  - name: kharcha-db
    plan: free

services:
  - type: web
    name: kharcha-app
    env: node
    plan: free
    buildCommand: npm run build:client
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kharcha-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
